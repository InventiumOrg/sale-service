version: '3.8'

services:
  sale-service:
    image: sale-service:1.0.0
    container_name: sale-service
    ports:
      - "15350:15350"
    env_file:
      - app.env
    restart: unless-stopped
    depends_on:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15350/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - inventium

networks:
  inventium:
    name: inventium
    external: true